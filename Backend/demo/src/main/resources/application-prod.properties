# ===================================================================
# PRODUCTION PROFILE - VPN PostgreSQL Database
# ===================================================================

# PostgreSQL connection (VPN)
# TODO: Replace these values with your actual VPN database credentials
spring.datasource.url=jdbc:postgresql://YOUR_VPN_IP:5432/menu_db
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

# PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
# Use 'validate' in production to prevent auto-schema changes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection pool settings (adjust based on your VPN/server capacity)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# SSL Configuration (if your VPN database requires SSL)
# Uncomment and configure if needed
# spring.datasource.hikari.data-source-properties.ssl=true
# spring.datasource.hikari.data-source-properties.sslmode=require

# Disable SQL logging in production for performance
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.FoodApplication=INFO
logging.level.org.springframework.web=INFO

# ===================================================================
# INSTRUCTIONS FOR VPN DATABASE SETUP:
# ===================================================================
# 1. Connect to your VPN first
# 2. Replace YOUR_VPN_IP with the PostgreSQL server IP (e.g., 10.0.0.5 or 192.168.1.100)
# 3. Replace YOUR_DB_USERNAME with your database username
# 4. Replace YOUR_DB_PASSWORD with your database password
# 5. Ensure the port is correct (default is 5432)
# 6. Test connection before deploying
# 7. Change spring.profiles.active=prod in application.properties
# ===================================================================